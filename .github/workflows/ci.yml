name: CI

on:
  push:
    branches:
      - dev
      - dev-next
      - next
      - beta
      - alpha
      - "*.x"
    paths:
      - "**.ts"
      - ".github/workflows/**.yml"
      - ".github/actions/**.yml"
      - "src/**"
      - "test/**"
      - "*.json"
      - "*.yaml"
  pull_request:
    paths:
      - "**.ts"
      - ".github/workflows/**.yml"
      - ".github/actions/**.yml"
      - "src/**"
      - "test/**"
      - "*.json"
      - "*.yaml"
    types:
      - opened
      - synchronize
  workflow_dispatch:
  workflow_call:
    inputs:
      release:
        type: boolean
        default: false
permissions:
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup and cache dependencies
        uses: ./.github/actions/setup-and-cache

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        if: inputs.release == true
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            browser/
            bundler/
            node/
            node-module/
            package.json
            README.md
            LICENSE
            jsr.json
          retention-days: 1

      - uses: browser-actions/setup-chrome@v2
      - name: Install test dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        continue-on-error: true
        run: pnpm test-ci

      - name: Generate test badges
        run: pnpm exec tsx scripts/make-badges.ts

      - name: Post Test Results Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('test-results.txt', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: comment
            });

      - name: Commit test badges
        if: github.event.pull_request.number == null || inputs.release == false
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "📝 docs: update test badges [skip ci]"
          file_pattern: '*.svg .github/badges/*.json' 
